<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TriCore — Project Performance Platform</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body,#root{margin:0;padding:0;min-height:100vh}
    body{background:#EEF2F7;font-family:system-ui,sans-serif}

    /* Boot screen */
    #boot{
      position:fixed;inset:0;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#0A0F1E 0%,#0F1D3E 35%,#0D2A6B 65%,#1245B5 100%);
      transition:opacity .4s ease;
    }
    #boot.hide{opacity:0;pointer-events:none}
    .boot-svg{margin-bottom:18px;filter:drop-shadow(0 2px 12px rgba(37,99,235,.5))}
    .boot-title{color:#fff;font-family:system-ui,sans-serif;font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
    .boot-sub{color:rgba(255,255,255,.4);font-family:system-ui,sans-serif;font-size:12px;margin-bottom:28px}
    .boot-ring{width:28px;height:28px;border:2.5px solid rgba(255,255,255,.15);border-top-color:#60A5FA;border-radius:50%;animation:bspin .7s linear infinite}
    @keyframes bspin{to{transform:rotate(360deg)}}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='20' y1='10' x2='80' y2='90' gradientUnits='userSpaceOnUse'><stop offset='0%25' stop-color='%2360A5FA'/><stop offset='55%25' stop-color='%232563EB'/><stop offset='100%25' stop-color='%231E3A8A'/></linearGradient></defs><path d='M50 8 L92 82 L8 82 Z' fill='url(%23g)'/><circle cx='50' cy='50' r='11' fill='none' stroke='white' stroke-width='3.5' stroke-opacity='.9'/><circle cx='50' cy='50' r='4' fill='white' fill-opacity='.5'/></svg>"/>
</head>
<body>
  <div id="boot">
    <svg class="boot-svg" width="52" height="52" viewBox="0 0 100 100" fill="none">
      <defs>
        <linearGradient id="bg" x1="20" y1="10" x2="80" y2="90" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#60A5FA"/>
          <stop offset="55%" stop-color="#2563EB"/>
          <stop offset="100%" stop-color="#1E3A8A"/>
        </linearGradient>
      </defs>
      <path d="M50 8 L92 82 L8 82 Z" fill="url(#bg)"/>
      <circle cx="50" cy="50" r="11" fill="none" stroke="white" stroke-width="3.5" stroke-opacity=".9"/>
      <circle cx="50" cy="50" r="4" fill="white" fill-opacity=".5"/>
    </svg>
    <div class="boot-title">TriCore</div>
    <div class="boot-sub">Project Performance Platform</div>
    <div class="boot-ring"></div>
  </div>
  <div id="root"></div>

  <script>
    // Hide boot screen once React renders
    var obs = new MutationObserver(function(){
      var r = document.getElementById('root');
      if(r && r.children.length > 0){
        var b = document.getElementById('boot');
        if(b){b.classList.add('hide');setTimeout(function(){b.remove()},450);}
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'),{childList:true,subtree:true});
    // Fallback: remove after 6s
    setTimeout(function(){
      var b=document.getElementById('boot');
      if(b){b.classList.add('hide');setTimeout(function(){b.remove()},450);}
    },6000);
  </script>

  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:14px;scroll-behavior:smooth}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#EEF2F7}
  button,input,select,textarea{font-family:inherit}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:99px}
  ::-webkit-scrollbar-thumb:hover{background:#94A3B8}
  ::selection{background:#DBEAFE;color:#1E40AF}

  /* \u2500\u2500 Keyframes \u2500\u2500 */
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
  @keyframes slideRight{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideLeft{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes popIn{0%{opacity:0;transform:scale(.8)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
  @keyframes shimmer{from{background-position:-200% 0}to{background-position:200% 0}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
  @keyframes bgAnim{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  @keyframes revealBar{from{width:0}to{width:var(--w)}}

  .anim-fade-up   {animation:fadeUp .25s cubic-bezier(.16,1,.3,1) both}
  .anim-scale-in  {animation:scaleIn .2s cubic-bezier(.16,1,.3,1) both}
  .anim-slide-r   {animation:slideRight .25s cubic-bezier(.16,1,.3,1) both}
  .anim-slide-l   {animation:slideLeft .25s cubic-bezier(.16,1,.3,1) both}
  .anim-fade-in   {animation:fadeIn .2s ease both}
  .anim-pop       {animation:popIn .35s cubic-bezier(.16,1,.3,1) both}
  .anim-shake     {animation:shake .35s cubic-bezier(.36,.07,.19,.97) both}

  /* \u2500\u2500 Stagger delays \u2500\u2500 */
  .stagger>*:nth-child(1){animation-delay:.04s}.stagger>*:nth-child(2){animation-delay:.08s}
  .stagger>*:nth-child(3){animation-delay:.12s}.stagger>*:nth-child(4){animation-delay:.16s}
  .stagger>*:nth-child(5){animation-delay:.20s}.stagger>*:nth-child(6){animation-delay:.24s}

  /* \u2500\u2500 Nav \u2500\u2500 */
  .nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:400;text-align:left;transition:all .15s;background:none;color:#64748B;border-left:2px solid transparent;font-family:inherit}
  .nav-item:hover{background:#EFF6FF;color:#1E40AF}
  .nav-item.active{background:#EFF6FF;color:#2563EB;font-weight:600;border-left-color:#2563EB}

  /* \u2500\u2500 Table \u2500\u2500 */
  .data-table{width:100%;border-collapse:collapse}
  .data-table th{padding:9px 14px;text-align:left;color:#94A3B8;font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:#F8FAFC;border-bottom:1px solid #F1F5F9;white-space:nowrap}
  .data-table td{padding:11px 14px;border-bottom:1px solid #F1F5F9;font-size:12.5px;color:#334155}
  .data-table tbody tr{transition:background .1s;cursor:pointer}
  .data-table tbody tr:hover td{background:#EFF6FF}
  .data-table tbody tr:last-child td{border-bottom:none}

  /* \u2500\u2500 WBS row \u2500\u2500 */
  .wbs-row:hover td{background:#EFF6FF!important}
  .wbs-row:hover .wbs-actions{opacity:1!important}
  .wbs-actions{opacity:0;transition:opacity .15s;display:flex;gap:4px}

  /* \u2500\u2500 Kanban \u2500\u2500 */
  .k-card{transition:box-shadow .15s,transform .12s;cursor:grab}
  .k-card:hover{box-shadow:0 6px 20px rgba(37,99,235,.14)!important;transform:translateY(-2px)}
  .k-card:active{cursor:grabbing;transform:scale(.98)}
  .k-drop-active{transition:background .15s,border-color .15s}

  /* \u2500\u2500 Auth \u2500\u2500 */
  .auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:linear-gradient(135deg,#0A0F1E 0%,#0F1D3E 35%,#0D2A6B 65%,#1245B5 100%);
    background-size:300% 300%;animation:bgAnim 16s ease infinite;position:relative;overflow:hidden}
  .auth-dot{position:absolute;border-radius:50%;background:rgba(255,255,255,.055);animation:float var(--d,6s) ease-in-out infinite var(--dl,0s)}
  .auth-grid-overlay{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
  .auth-glow{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
  .auth-card{background:rgba(10,15,40,.72);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:32px;width:100%;max-width:440px;position:relative;z-index:1;box-shadow:0 40px 100px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04) inset}

  .auth-tab-bar{display:flex;background:rgba(255,255,255,.055);border-radius:10px;padding:3px;gap:3px;margin-bottom:24px}
  .auth-tab{flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:rgba(255,255,255,.38);background:transparent;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .22s cubic-bezier(.16,1,.3,1);font-family:inherit}
  .auth-tab.active{background:rgba(255,255,255,.1);color:#60A5FA;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.2)}

  .auth-field{display:flex;flex-direction:column;gap:5px}
  .auth-field label{color:rgba(255,255,255,.48);font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
  .auth-input-wrap{position:relative;display:flex;align-items:center}
  .auth-input-wrap .ai-l{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(148,163,184,.65);pointer-events:none;transition:color .15s;display:flex}
  .auth-input-wrap:focus-within .ai-l{color:#60A5FA}
  .auth-input-wrap .ai-r{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:rgba(148,163,184,.65);cursor:pointer;padding:4px;border-radius:4px;display:flex;transition:color .15s}
  .auth-input-wrap .ai-r:hover{color:#60A5FA}
  .auth-inp{width:100%;padding:10px 12px 10px 42px;background:rgba(255,255,255,.065);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;color:#fff;font-size:13.5px;outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
  .auth-inp.has-r{padding-right:42px}
  .auth-inp::placeholder{color:rgba(255,255,255,.25)}
  .auth-inp:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.18)}
  .auth-inp.err{border-color:#EF4444;box-shadow:0 0 0 3px rgba(239,68,68,.14)}
  .auth-inp.ok{border-color:#22C55E}
  .field-err{display:flex;align-items:center;gap:5px;color:#FCA5A5;font-size:11px;font-weight:500}

  .auth-alert{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;font-size:12px;font-weight:500;margin-bottom:14px}
  .auth-alert.err{background:rgba(220,38,38,.16);border:1px solid rgba(220,38,38,.28);color:#FCA5A5}
  .auth-alert.ok{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.28);color:#6EE7B7}

  .auth-btn{width:100%;padding:12px;background:#2563EB;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;font-family:inherit;box-shadow:0 1px 3px rgba(37,99,235,.4),0 4px 16px rgba(37,99,235,.25);transition:all .18s}
  .auth-btn:hover:not(:disabled){background:#1D4ED8;box-shadow:0 2px 6px rgba(37,99,235,.5),0 8px 24px rgba(37,99,235,.35);transform:translateY(-1px)}
  .auth-btn:active:not(:disabled){transform:translateY(0)}
  .auth-btn:disabled{background:#475569;box-shadow:none;cursor:not-allowed;transform:none}
  .auth-spinner{width:15px;height:15px;border:2.5px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}

  .role-card{display:flex;align-items:flex-start;gap:12px;padding:12px 13px;border:1.5px solid rgba(255,255,255,.09);border-radius:9px;cursor:pointer;background:rgba(255,255,255,.04);transition:all .18s;position:relative;overflow:hidden}
  .role-card:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.07)}
  .role-card.sel{border-color:#3B82F6;background:rgba(37,99,235,.14);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
  .role-check{position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:50%;background:#2563EB;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.5);transition:all .2s cubic-bezier(.16,1,.3,1)}
  .role-card.sel .role-check{opacity:1;transform:scale(1)}
  .role-icon-wrap{width:33px;height:33px;border-radius:8px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .18s}
  .role-card.sel .role-icon-wrap{background:rgba(37,99,235,.3)}

  .demo-pill{display:flex;align-items:center;gap:11px;padding:9px 13px;background:rgba(255,255,255,.054);border:1px solid rgba(255,255,255,.1);border-radius:9px;cursor:pointer;width:100%;text-align:left;transition:all .18s;font-family:inherit}
  .demo-pill:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.22);transform:translateX(4px)}
  .pw-bar-track{background:rgba(255,255,255,.09);border-radius:3px;height:3px;overflow:hidden;margin-top:6px}
  .pw-bar-fill{height:100%;border-radius:3px;transition:width .3s ease,background .3s ease}

  /* \u2500\u2500 Tooltip \u2500\u2500 */
  .tt-host{position:relative}
  .tt{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#0F172A;color:#E2E8F0;font-size:11px;padding:6px 10px;border-radius:6px;white-space:nowrap;z-index:200;opacity:0;pointer-events:none;transition:opacity .15s;box-shadow:0 4px 12px rgba(0,0,0,.3);max-width:220px;text-align:center;white-space:normal;line-height:1.5}
  .tt-host:hover .tt{opacity:1}

  /* \u2500\u2500 General buttons \u2500\u2500 */
  .btn-p{background:#2563EB;color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;box-shadow:0 1px 3px rgba(37,99,235,.3);transition:all .18s;font-family:inherit}
  .btn-p:hover{background:#1D4ED8;box-shadow:0 4px 14px rgba(37,99,235,.38);transform:translateY(-1px)}
  .btn-p:disabled{background:#CBD5E1;cursor:not-allowed;box-shadow:none;transform:none}
  .btn-g{background:#fff;border:1px solid #E2E8F0;border-radius:7px;padding:7px 14px;font-size:12.5px;cursor:pointer;color:#64748B;transition:all .18s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
  .btn-g:hover{border-color:#2563EB;color:#2563EB}
  .btn-danger{background:#fff;border:1px solid #FECACA;border-radius:6px;padding:5px 11px;font-size:11px;cursor:pointer;color:#DC2626;transition:all .18s;font-family:inherit}
  .btn-danger:hover{background:#FEE2E2;border-color:#DC2626}

  /* \u2500\u2500 KPI card \u2500\u2500 */
  .kpi-card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:18px 20px;display:flex;flex-direction:column;gap:5px;box-shadow:0 1px 4px rgba(0,0,0,.055);transition:box-shadow .2s,transform .2s}
  .kpi-card:hover{box-shadow:0 6px 20px rgba(37,99,235,.1);transform:translateY(-1px)}
  .kpi-label{color:#94A3B8;font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
  .kpi-value{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.025em;line-height:1}
  .kpi-sub{font-size:11.5px;font-weight:500;margin-top:2px}
  .kpi-accent{height:2px;width:28px;border-radius:2px;margin-top:6px}

  /* \u2500\u2500 Panel \u2500\u2500 */
  .panel{background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.055)}
  .panel-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid #F1F5F9;background:#F8FAFC}
  .panel-hd-title{color:#475569;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  .panel-body{padding:18px}

  /* \u2500\u2500 Tag / Badge \u2500\u2500 */
  .tag{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:5px;font-size:10.5px;font-weight:600;letter-spacing:.02em;white-space:nowrap;border:1px solid transparent}
  .tag::before{content:'';width:4.5px;height:4.5px;border-radius:50%;background:currentColor;flex-shrink:0}

  /* \u2500\u2500 Bars \u2500\u2500 */
  .bar-track{background:#F1F5F9;border-radius:99px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.16,1,.3,1)}

  /* \u2500\u2500 Modal \u2500\u2500 */
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .18s ease both}
  .modal-box{background:#fff;border-radius:16px;padding:28px;width:100%;box-shadow:0 32px 80px rgba(0,0,0,.24),0 0 0 1px rgba(0,0,0,.05);max-height:90vh;overflow-y:auto;animation:scaleIn .2s cubic-bezier(.16,1,.3,1) both}
  .modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
  .modal-hd h2{color:#0F172A;font-size:16px;font-weight:700}
  .modal-close-btn{width:30px;height:30px;background:#F1F5F9;border:none;border-radius:7px;cursor:pointer;color:#64748B;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .modal-close-btn:hover{background:#E2E8F0;color:#334155}

  /* \u2500\u2500 Form fields \u2500\u2500 */
  .ff{display:flex;flex-direction:column;gap:5px}
  .ff label{color:#64748B;font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
  .ff .note{color:#94A3B8;font-size:10.5px;line-height:1.5;margin-top:2px}
  .fi{padding:9px 11px;background:#fff;border:1.5px solid #E2E8F0;border-radius:8px;color:#0F172A;font-size:13px;outline:none;width:100%;box-sizing:border-box;transition:border-color .15s,box-shadow .15s;font-family:inherit}
  .fi:focus{border-color:#2563EB;box-shadow:0 0 0 3px #DBEAFE}
  .fi::placeholder{color:#CBD5E1}

  /* \u2500\u2500 Insight cards \u2500\u2500 */
  .insight-card{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:9px;border-left:3px solid;animation:fadeUp .22s ease both}
  .insight-card-title{font-size:12.5px;font-weight:700;margin-bottom:3px;color:#1E293B}
  .insight-card-msg{font-size:12px;line-height:1.6;color:#475569}

  /* \u2500\u2500 EVM strip \u2500\u2500 */
  .evm-strip{background:linear-gradient(135deg,#0F172A 0%,#1D4ED8 100%);border-radius:14px;padding:20px 24px;color:#fff;margin-bottom:16px}
  .evm-pill{background:rgba(255,255,255,.1);border-radius:8px;padding:8px 13px;flex:1 1 70px}
  .evm-pill-label{font-size:9.5px;opacity:.6;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
  .evm-pill-val{font-size:13px;font-family:'DM Mono',monospace;font-weight:700}

  /* \u2500\u2500 Gantt \u2500\u2500 */
  .gantt-row{display:flex;align-items:stretch;border-bottom:1px solid #F1F5F9;min-height:38px}
  .gantt-label{min-width:240px;flex-shrink:0;display:flex;align-items:center;padding:8px 14px;border-right:1px solid #F1F5F9;overflow:hidden}
  .gantt-area{flex:1;position:relative;min-width:600px}
  .gantt-today-line{position:absolute;top:0;bottom:0;width:1.5px;background:#EF4444;opacity:.6;z-index:3}

  /* \u2500\u2500 Success screen \u2500\u2500 */
  .success-ring{width:62px;height:62px;background:linear-gradient(135deg,#059669,#34D399);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 28px rgba(5,150,105,.35);animation:popIn .4s cubic-bezier(.16,1,.3,1) both}

  /* \u2500\u2500 Sidebar \u2500\u2500 */
  .sidebar{width:230px;flex-shrink:0;background:#fff;border-right:1px solid #E2E8F0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;box-shadow:2px 0 16px rgba(0,0,0,.04)}
  .topbar{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.05)}
  .app-content{flex:1;padding:26px 28px 60px;overflow-y:auto}

  /* \u2500\u2500 Tab buttons \u2500\u2500 */
  .proj-tab{background:none;border:none;color:#94A3B8;padding:10px 18px;font-size:13px;font-weight:400;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s;font-family:inherit;position:relative}
  .proj-tab:hover{color:#2563EB}
  .proj-tab.active{color:#2563EB;font-weight:600;border-bottom-color:#2563EB}

      items.push({ id:stepId, pid:project.id, projectId:project.id, project_id:project.id, par:rootId, code:step.code, name:step.name, description:project.desc || '', type:'workpackage', resp:project.owner, ps:stepStart, pe:stepEnd, bac:toNumber(step.bac), ac:0, pct:typeof step.pct === 'number' ? step.pct : (step.status === 'completed' ? 100 : step.status === 'inProgress' ? 35 : 0), status:step.status, deps:prevId ? [prevId] : [], pri:project.priority, ks:step.ks || (step.status === 'completed' ? 'done' : step.status === 'inProgress' ? 'inprogress' : 'backlog') });
      cursor = stepEnd;
      prevId = stepId;
    });
    project.budget = totalBudget;
    return { ok:true, project, wbs:items };
  }
  function syncProjectArtifacts(state){
    const next = { ...(state || {}) };
    next.projects = Array.isArray(next.projects) ? next.projects.map(normalizeProject) : [];
    next.wbs = Array.isArray(next.wbs) ? next.wbs.map(function(item){
      const project = next.projects.find(function(p){ return p.id === (item.projectId || item.project_id || item.pid); });
      if(!project) return { ...item, projectId:item.projectId || item.pid, project_id:item.project_id || item.pid };
      const linked = { ...item, pid:item.pid || project.id, projectId:item.projectId || project.id, project_id:item.project_id || project.id, resp:item.resp || project.owner, pri:item.pri || project.priority };
      if(item.type === 'summary' || item.par == null){ linked.name = project.name; linked.ps = project.start; linked.pe = project.end; linked.status = project.status; linked.ks = project.status === 'completed' ? 'done' : (project.status === 'inProgress' ? 'inprogress' : 'backlog'); linked.pct = typeof linked.pct === 'number' ? linked.pct : project.progress || 0; }
      return linked;
    }) : [];
    return next;
  }
  window.TriCoreProjectTools = { templateMap:templateMap, suggestProjectSequence:suggestProjectSequence, defaultProjectName:defaultProjectName, defaultProjectCode:defaultProjectCode, createProjectPackage:createProjectPackage, syncProjectArtifacts:syncProjectArtifacts };
})();

<script>
/* =========================
   APPLICATION DATA + AUTH + SYNC SECTION
   - Storage/session keys

(function(){
  // Storage and session keys used by the demo layer
  const STORAGE_KEYS = {
    USERS: 'tc_users',
    SESSION: 'tc_session',
    DATA_PREFIX: 'tc_user_data_'
  };

  function safeParse(value, fallback){
    try { return JSON.parse(value); } catch (e) { return fallback; }
  }

  function clamp(value, min, max){
    return Math.min(Math.max(value, min), max);
  }

  
  // AUTH HELPERS: user/session storage access
  function getUsers(){
    return safeParse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]', []);
  }

  function getSession(){
    return safeParse(localStorage.getItem(STORAGE_KEYS.SESSION) || 'null', null);
  }

  function getUserState(userId){
    if(!userId) return null;
    return safeParse(localStorage.getItem(STORAGE_KEYS.DATA_PREFIX + userId) || 'null', null);
  }

  function saveUserState(userId, nextState){
    if(!userId) return;
    localStorage.setItem(STORAGE_KEYS.DATA_PREFIX + userId, JSON.stringify(nextState));
    window.dispatchEvent(new CustomEvent('tricore:data-updated', { detail: { userId: userId } }));
  }

  function inferTaskStatus(task){
    const raw = String(task?.status || task?.state || task?.column || task?.phase || '').toLowerCase();
    if (/(done|closed|complete|completed)/.test(raw)) return 'done';
    if (/(progress|active|doing|executing|review|testing)/.test(raw)) return 'in_progress';
    return 'todo';
  }

  function inferTaskTitle(task, idx){
    return task?.title || task?.name || task?.activity || task?.task || task?.deliverable || `Task ${idx + 1}`;
  }

  function inferTaskDates(task){
    return {
      start_date: task?.startDate || task?.start || task?.plannedStart || task?.baselineStart || null,
      due_date: task?.dueDate || task?.endDate || task?.finish || task?.plannedFinish || task?.baselineFinish || null,
    };
  }

  function normalizeProjects(projects){
    return (Array.isArray(projects) ? projects : []).map(function(project, idx){
      return {
        id: project?.id || project?.projectId || `project_${idx + 1}`,
        name: project?.name || project?.title || `Project ${idx + 1}`,
        status: project?.status || project?.health || 'active',
        owner_id: project?.ownerId || project?.managerId || null,
        progress: typeof project?.progress === 'number' ? project.progress : null,
        start_date: project?.startDate || project?.start || null,
        due_date: project?.dueDate || project?.finish || project?.endDate || null,
        raw: project
      };
    });
  }

  function normalizeTasks(state){
    const rows = Array.isArray(state?.wbs) ? state.wbs : [];
    return rows.map(function(task, idx){
      const dates = inferTaskDates(task);
      return {
        id: task?.id || task?.taskId || task?.wbsId || `task_${idx + 1}`,
        project_id: task?.projectId || task?.project_id || task?.pid || null,
        title: inferTaskTitle(task, idx),
        description: task?.description || task?.notes || '',
        assignee_id: task?.ownerId || task?.assigneeId || task?.assignedTo || null,
        status: inferTaskStatus(task),
        priority: task?.priority || task?.pri || 'medium',
        progress: typeof task?.progress === 'number' ? task.progress : (typeof task?.percentComplete === 'number' ? task.percentComplete : (typeof task?.pct === 'number' ? task.pct : null)),
        dependency_ids: Array.isArray(task?.dependencies) ? task.dependencies : (Array.isArray(task?.dependencyIds) ? task.dependencyIds : (Array.isArray(task?.deps) ? task.deps : [])),
        start_date: dates.start_date,
        due_date: dates.due_date,
        raw: task
      };
    });
  }

  function buildKanbanColumns(tasks){
    const columns = [
      { id: 'todo', title: 'To Do', items: [] },
      { id: 'in_progress', title: 'In Progress', items: [] },
      { id: 'done', title: 'Done', items: [] }
    ];
    const map = Object.fromEntries(columns.map(c => [c.id, c]));
    tasks.forEach(function(task){
      (map[task.status] || map.todo).items.push(task);
    });
    return columns;
  }

  function buildGanttItems(tasks){
    return tasks
      .filter(function(task){ return task.start_date || task.due_date; })
      .map(function(task){
        return {
          id: task.id,
          label: task.title,
          project_id: task.project_id,
          start_date: task.start_date,
          due_date: task.due_date,
          progress: task.progress,
          status: task.status,
          dependency_ids: task.dependency_ids
        };
      });
  }

  window.TriCoreDataBridge = {
    version: '1.0.0',
    storageKeys: STORAGE_KEYS,
    getUsers: getUsers,
    getSession: getSession,
    getUserState: getUserState,
    saveUserState: saveUserState,
    normalizeProjects: normalizeProjects,
    normalizeTasks: normalizeTasks,
    getNormalizedPayload: function(userId){
      const session = getSession();
      const resolvedUserId = userId || session?.userId || getUsers()?.[0]?.id;
      const state = getUserState(resolvedUserId) || {};
      const projects = normalizeProjects(state.projects);
      const tasks = normalizeTasks(state);
      return {
        user_id: resolvedUserId,
        profile: state.profile || null,
        projects: projects,
        tasks: tasks,
        kanban: buildKanbanColumns(tasks),
        gantt: buildGanttItems(tasks),
        baselines: Array.isArray(state.baselines) ? state.baselines : [],
        risks: Array.isArray(state.risks) ? state.risks : [],
        change_requests: Array.isArray(state.changeRequests) ? state.changeRequests : [],
        claims: Array.isArray(state.claims) ? state.claims : []
      };
    },
    moveTask: function(userId, taskId, nextStatus){
      const state = getUserState(userId);
      if(!state || !Array.isArray(state.wbs)) return false;
      const normalizedStatus = nextStatus === 'inprogress' ? 'in_progress' : nextStatus;
      const candidates = {
        todo: 'To Do',
        in_progress: 'In Progress',
        done: 'Done'
      };
      const updated = state.wbs.map(function(task){
        const id = task?.id || task?.taskId || task?.wbsId;
        if(String(id) !== String(taskId)) return task;
        return Object.assign({}, task, {
          status: candidates[normalizedStatus] || nextStatus,
          state: candidates[normalizedStatus] || nextStatus,
          column: normalizedStatus
        });
      });
      saveUserState(userId, Object.assign({}, state, { wbs: updated }));
      return true;
    }
  };

  const style = document.createElement('style');
  style.textContent = `
    .tricore-draggable-modal {
      position: fixed !important;
      margin: 0 !important;
      will-change: left, top;
      z-index: 1001;
    }
    .tricore-modal-handle {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      cursor: move;
      user-select: none;
      z-index: 2;
      background: linear-gradient(to bottom, rgba(248,250,252,.96), rgba(248,250,252,.72), rgba(248,250,252,0));
      border-top-left-radius: inherit;
      border-top-right-radius: inherit;
      opacity: .92;
    }
    .tricore-modal-handle[data-dark="true"] {
      background: linear-gradient(to bottom, rgba(15,23,42,.92), rgba(15,23,42,.6), rgba(15,23,42,0));
    }
    .tricore-modal-grip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #64748B;
      pointer-events: none;
    }
    .tricore-modal-handle[data-dark="true"] .tricore-modal-grip {
      color: rgba(255,255,255,.75);
    }
    .tricore-modal-dots {
      display: inline-flex;
      gap: 4px;
    }
    .tricore-modal-dots span {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: currentColor;
      opacity: .75;
    }
    .tricore-modal-reset {
      appearance: none;
      border: 1px solid rgba(148,163,184,.35);
      background: rgba(255,255,255,.8);
      color: #334155;
      border-radius: 999px;
      height: 28px;
      padding: 0 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .tricore-modal-handle[data-dark="true"] .tricore-modal-reset {
      background: rgba(15,23,42,.72);
      color: rgba(255,255,255,.9);
      border-color: rgba(255,255,255,.16);
    }
    .tricore-draggable-modal[data-dragging="true"] {
      transition: none !important;
      box-shadow: 0 24px 60px rgba(15,23,42,.22) !important;
    }
  `;
  document.head.appendChild(style);

  function isOverlayCandidate(el){
    if(!(el instanceof HTMLElement)) return false;
    const cs = getComputedStyle(el);
    if(cs.position !== 'fixed') return false;
    const rect = el.getBoundingClientRect();
    if(rect.width < window.innerWidth * 0.85 || rect.height < window.innerHeight * 0.75) return false;
    if(rect.top > 10 || rect.left > 10) return false;
    const bg = cs.backgroundColor || '';
    if(!/rgba?\(/.test(bg)) return false;
    if(Number(cs.zIndex || 0) < 40) return false;
    if(el.id === 'boot') return false;
    return true;
  }

  function findDialogWithin(overlay){
    const candidates = Array.from(overlay.querySelectorAll('div,section,article,form')).filter(function(node){
      if(!(node instanceof HTMLElement)) return false;
      if(node.dataset.tricoreDialog === 'true') return false;
      const cs = getComputedStyle(node);
      if(cs.position === 'fixed') return false;
      const rect = node.getBoundingClientRect();
      if(rect.width < 260 || rect.height < 140) return false;
      if(rect.width > window.innerWidth * 0.95 || rect.height > window.innerHeight * 0.95) return false;
      const bg = cs.backgroundColor || '';
      if(bg === 'rgba(0, 0, 0, 0)' || bg === 'transparent') return false;
      if(Number.parseFloat(cs.borderRadius || '0') < 8) return false;
      return true;
    });
    return candidates.sort(function(a, b){
      const ar = a.getBoundingClientRect();
      const br = b.getBoundingClientRect();
      return (br.width * br.height) - (ar.width * ar.height);
    })[0] || null;
  }

  function centerModal(modal){
    const rect = modal.getBoundingClientRect();
    const left = Math.round((window.innerWidth - rect.width) / 2);
    const top = Math.max(16, Math.round((window.innerHeight - rect.height) / 2));
    modal.style.left = left + 'px';
    modal.style.top = top + 'px';
  }

  function clampModal(modal){
    const rect = modal.getBoundingClientRect();
    const maxLeft = Math.max(12, window.innerWidth - rect.width - 12);
    const maxTop = Math.max(12, window.innerHeight - rect.height - 12);
    const left = clamp(parseFloat(modal.style.left || rect.left || 0), 12, maxLeft);
    const top = clamp(parseFloat(modal.style.top || rect.top || 0), 12, maxTop);
    modal.style.left = left + 'px';
    modal.style.top = top + 'px';
  }

  function getModalKey(modal){
    const titleNode = modal.querySelector('h1,h2,h3,[data-title],strong');
    const title = titleNode ? titleNode.textContent.trim().slice(0, 40) : 'dialog';
    return 'tricore_modal_pos_' + title.replace(/\s+/g, '_').toLowerCase();
  }

  function applySavedPosition(modal){
    const key = getModalKey(modal);
    const saved = safeParse(sessionStorage.getItem(key) || 'null', null);
    if(saved && typeof saved.left === 'number' && typeof saved.top === 'number'){
      modal.style.left = saved.left + 'px';
      modal.style.top = saved.top + 'px';
      clampModal(modal);
      return;
    }
    centerModal(modal);
  }

  function persistPosition(modal){
    const key = getModalKey(modal);
    sessionStorage.setItem(key, JSON.stringify({
      left: parseFloat(modal.style.left || '0') || 0,
      top: parseFloat(modal.style.top || '0') || 0
    }));
  }

  function enhanceModal(overlay, modal){
    if(!overlay || !modal || modal.dataset.tricoreDialog === 'true') return;
    modal.dataset.tricoreDialog = 'true';
    overlay.dataset.tricoreOverlay = 'true';
    overlay.style.alignItems = 'flex-start';
    overlay.style.justifyContent = 'flex-start';

    const darkBg = /rgba?\((1[0-9]|2[0-9]|3[0-9]),\s*(1[0-9]|2[0-9]|3[0-9]),\s*(4[0-9]|5[0-9]|6[0-9])/.test(getComputedStyle(modal).backgroundColor || '');
    modal.classList.add('tricore-draggable-modal');
    modal.style.position = 'fixed';
    modal.style.maxWidth = modal.style.maxWidth || 'min(92vw, 960px)';
    modal.style.maxHeight = modal.style.maxHeight || 'calc(100vh - 24px)';
    modal.style.overflow = modal.style.overflow || 'auto';
    if(getComputedStyle(modal).position === 'static') modal.style.position = 'fixed';
    if(getComputedStyle(modal).position !== 'fixed') modal.style.position = 'fixed';
    if(getComputedStyle(modal).zIndex === 'auto') modal.style.zIndex = '1001';
    if(getComputedStyle(modal).paddingTop === '0px') modal.style.paddingTop = '44px';
    else modal.style.paddingTop = 'max(44px, ' + getComputedStyle(modal).paddingTop + ')';
    modal.style.touchAction = 'none';

    const handle = document.createElement('div');
    handle.className = 'tricore-modal-handle';
    handle.setAttribute('data-dark', darkBg ? 'true' : 'false');
    handle.innerHTML = '<div class="tricore-modal-grip"><span class="tricore-modal-dots"><span></span><span></span><span></span></span><span>Drag window</span></div>';
    const resetBtn = document.createElement('button');
    resetBtn.type = 'button';
    resetBtn.className = 'tricore-modal-reset';
    resetBtn.textContent = 'Reset';
    resetBtn.addEventListener('click', function(ev){
      ev.stopPropagation();
      centerModal(modal);
      persistPosition(modal);
    });
    handle.appendChild(resetBtn);
    modal.insertBefore(handle, modal.firstChild);

    requestAnimationFrame(function(){
      applySavedPosition(modal);
      clampModal(modal);
    });

    let dragState = null;
    handle.addEventListener('pointerdown', function(ev){
      if(ev.button !== 0) return;
      if(ev.target && ev.target.closest('button')) return;
      const rect = modal.getBoundingClientRect();
      dragState = {
        startX: ev.clientX,
        startY: ev.clientY,
        left: rect.left,
        top: rect.top
      };
      modal.dataset.dragging = 'true';
      handle.setPointerCapture(ev.pointerId);
      ev.preventDefault();
    });

    handle.addEventListener('pointermove', function(ev){
      if(!dragState) return;
      const rect = modal.getBoundingClientRect();
      const nextLeft = dragState.left + (ev.clientX - dragState.startX);
      const nextTop = dragState.top + (ev.clientY - dragState.startY);
      modal.style.left = clamp(nextLeft, 12, Math.max(12, window.innerWidth - rect.width - 12)) + 'px';
      modal.style.top = clamp(nextTop, 12, Math.max(12, window.innerHeight - rect.height - 12)) + 'px';
    });

    function endDrag(ev){
      if(!dragState) return;
      dragState = null;
      modal.dataset.dragging = 'false';
      try { handle.releasePointerCapture(ev.pointerId); } catch(e) {}
      persistPosition(modal);
    }
    handle.addEventListener('pointerup', endDrag);
    handle.addEventListener('pointercancel', endDrag);
  }

  function scanAndEnhance(){
    Array.from(document.body.querySelectorAll('div')).filter(isOverlayCandidate).forEach(function(overlay){
      const modal = findDialogWithin(overlay);
      if(modal) enhanceModal(overlay, modal);
    });
  }

  const observer = new MutationObserver(function(){
    scanAndEnhance();
  });

  observer.observe(document.body, { childList: true, subtree: true });
  window.addEventListener('resize', function(){
    document.querySelectorAll('.tricore-draggable-modal').forEach(function(modal){
      clampModal(modal);
      persistPosition(modal);
    });
  });

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', scanAndEnhance, { once: true });
  } else {
    scanAndEnhance();
  }
})();

<script>
(function(){
  if (window.TriCoreLaunchKit) return;

  const STORAGE = (window.TriCoreDataBridge && window.TriCoreDataBridge.storageKeys) || {
    USERS: 'tc_users',
    SESSION: 'tc_session',
    DATA_PREFIX: 'tc_user_data_'
  };

  const STATUS_MAP = {
    notStarted: 'todo',
    todo: 'todo',
    backlog: 'todo',
    open: 'todo',
    inProgress: 'in_progress',
    in_progress: 'in_progress',
    active: 'in_progress',
    doing: 'in_progress',
    review: 'in_progress',
    completed: 'done',
    complete: 'done',
    done: 'done',
    closed: 'done'
  };

  function safeParse(value, fallback){
    try { return JSON.parse(value); } catch(e){ return fallback; }
  }
  function clone(obj){ return JSON.parse(JSON.stringify(obj)); }
  function uid(prefix){ return (prefix || 'id') + '-' + Math.random().toString(36).slice(2, 10); }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function toISO(d){
    if (!d) return null;
    const x = new Date(d);
    if (Number.isNaN(x.getTime())) return null;
    return x.toISOString().slice(0,10);
  }
  function addDays(date, days){
    const d = new Date(date || Date.now());
    d.setDate(d.getDate() + Number(days || 0));
    return toISO(d);
  }
  function cleanCode(v){
    return String(v || '').trim().toUpperCase().replace(/\s+/g, '-');
  }
  function toNumber(v){
    const n = Number(v);
    return Number.isFinite(n) ? n : 0;
  }
  function normalizeBoardStatus(v){
    return STATUS_MAP[String(v || '').trim()] || STATUS_MAP[String(v || '').trim().toLowerCase()] || 'todo';
  }
  function boardToProjectStatus(boardStatus){
    if (boardStatus === 'done') return 'completed';
    if (boardStatus === 'in_progress') return 'inProgress';
    return 'notStarted';
  }
  function getSession(){
    return safeParse(localStorage.getItem(STORAGE.SESSION) || 'null', null);
  }
  function getState(userId){
    return safeParse(localStorage.getItem(STORAGE.DATA_PREFIX + userId) || 'null', null);
  }
  function saveState(userId, state){
    localStorage.setItem(STORAGE.DATA_PREFIX + userId, JSON.stringify(state));
    window.dispatchEvent(new CustomEvent('tricore:data-updated', { detail: { userId } }));
  }

  function getCurrentUserId(){
    const session = getSession();
    return session && session.userId ? session.userId : null;
  }

  function taskDates(task){
    return {
      start: toISO(task.ps || task.startDate || task.start || task.plannedStart || task.baselineStart || task.start_date || todayISO()),
      end: toISO(task.pe || task.dueDate || task.endDate || task.finish || task.plannedFinish || task.baselineFinish || task.due_date || todayISO())
    };
  }

  function taskProgress(task){
    const pct = task.pct ?? task.progress ?? task.percentComplete;
    const n = toNumber(pct);
    return Math.max(0, Math.min(100, n));
  }

  function taskBudget(task){
    return toNumber(task.bac ?? task.budget ?? task.plannedCost ?? 0);
  }

  function taskActualCost(task){
    const ac = task.ac ?? task.actualCost;
    if (ac != null && ac !== '') return toNumber(ac);
    const bac = taskBudget(task);
    const pct = taskProgress(task) / 100;
    return Math.round(bac * pct * 0.9);
  }

  function earnedValueForTask(task){
    return taskBudget(task) * (taskProgress(task) / 100);
  }

  function plannedValueForTask(task, statusDate){
    const dates = taskDates(task);
    const start = new Date(dates.start);
    const end = new Date(dates.end || dates.start);
    const status = new Date(statusDate || todayISO());
    const bac = taskBudget(task);
    if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return 0;
    if (status <= start) return 0;
    if (status >= end) return bac;
    const total = Math.max(1, end.getTime() - start.getTime());
    const elapsed = Math.max(0, status.getTime() - start.getTime());
    return bac * (elapsed / total);
  }

  function calcTaskEvm(task, statusDate){
    const BAC = taskBudget(task);
    const EV = earnedValueForTask(task);
    const AC = taskActualCost(task);
    const PV = plannedValueForTask(task, statusDate);
    const CPI = AC > 0 ? EV / AC : null;
    const SPI = PV > 0 ? EV / PV : null;
    const EAC = CPI && CPI > 0 ? BAC / CPI : null;
    const ETC = EAC != null ? Math.max(0, EAC - AC) : null;
    const VAC = EAC != null ? BAC - EAC : null;
    return { BAC, EV, AC, PV, CPI, SPI, EAC, ETC, VAC };
  }

  function aggregateProjectMetrics(tasks, statusDate){
    const metrics = (tasks || []).reduce((acc, task) => {
      const m = calcTaskEvm(task, statusDate);
      acc.BAC += m.BAC;
      acc.EV += m.EV;
      acc.AC += m.AC;
      acc.PV += m.PV;
      return acc;
    }, { BAC: 0, EV: 0, AC: 0, PV: 0 });

    metrics.CPI = metrics.AC > 0 ? metrics.EV / metrics.AC : null;
    metrics.SPI = metrics.PV > 0 ? metrics.EV / metrics.PV : null;
    metrics.EAC = metrics.CPI && metrics.CPI > 0 ? metrics.BAC / metrics.CPI : null;
    metrics.ETC = metrics.EAC != null ? Math.max(0, metrics.EAC - metrics.AC) : null;
    metrics.VAC = metrics.EAC != null ? metrics.BAC - metrics.EAC : null;
    metrics.CV = metrics.EV - metrics.AC;
    metrics.SV = metrics.EV - metrics.PV;
    metrics.TCPI = (metrics.BAC - metrics.AC) > 0 ? (metrics.BAC - metrics.EV) / (metrics.BAC - metrics.AC) : null;
    metrics.progress = metrics.BAC > 0 ? (metrics.EV / metrics.BAC) * 100 : 0;
    metrics.health = (
      metrics.CPI != null && metrics.CPI < 0.85 ||
      metrics.SPI != null && metrics.SPI < 0.85
    ) ? 'critical' : (
      metrics.CPI != null && metrics.CPI < 0.95 ||
      metrics.SPI != null && metrics.SPI < 0.95
    ) ? 'atRisk' : 'onTrack';
    return metrics;
  }

  function normalizeTaskEntity(task, project){
    const dates = taskDates(task);
    const boardStatus = normalizeBoardStatus(task.column || task.ks || task.status || task.state);
    const projectId = task.projectId || task.project_id || task.pid || project.id;
    const out = Object.assign({}, task, {
      id: task.id || uid('task'),
      projectId: projectId,
      project_id: projectId,
      pid: projectId,
      name: task.name || task.title || 'Untitled Task',
      title: task.title || task.name || 'Untitled Task',
      ps: dates.start,
      pe: dates.end,
      startDate: dates.start,
      dueDate: dates.end,
      pct: taskProgress(task),
      progress: taskProgress(task),
      bac: taskBudget(task),
      ac: taskActualCost(task),
      ks: boardStatus === 'in_progress' ? 'inprogress' : boardStatus,
      column: boardStatus,
      status: boardToProjectStatus(boardStatus),
      deps: Array.isArray(task.deps) ? task.deps : (Array.isArray(task.dependencies) ? task.dependencies : []),
      pri: task.pri || task.priority || project.priority || 'medium',
      resp: task.resp || task.owner || task.assignee || project.owner || '',
      type: task.type || 'workpackage'
    });
    out.evm = calcTaskEvm(out);
    return out;
  }

  function computeProjectWindow(tasks, fallbackStart, fallbackEnd){
    const starts = tasks.map(t => taskDates(t).start).filter(Boolean).sort();
    const ends = tasks.map(t => taskDates(t).end).filter(Boolean).sort();
    return {
      start: starts[0] || fallbackStart || todayISO(),
      end: ends[ends.length - 1] || fallbackEnd || fallbackStart || todayISO()
    };
  }

  
  // DATA SYNC ENGINE: one source of truth feeding Dashboard, Kanban, Gantt, and EVM
  function syncStateArtifacts(state){
    const next = clone(state || {});
    next.projects = Array.isArray(next.projects) ? next.projects : [];
    next.wbs = Array.isArray(next.wbs) ? next.wbs : [];
    next.projectSettings = Array.isArray(next.projectSettings) ? next.projectSettings : [];
    next.audit = Array.isArray(next.audit) ? next.audit : [];

    next.projects = next.projects.map(function(project){
      const projectId = project.id;
      const projectTasks = next.wbs
        .filter(item => (item.projectId || item.project_id || item.pid) === projectId && item.type !== 'summary')
        .map(item => normalizeTaskEntity(item, project));

      const summary = next.wbs.find(item => (item.projectId || item.project_id || item.pid) === projectId && (item.type === 'summary' || item.par == null));
      const windowInfo = computeProjectWindow(projectTasks, project.start, project.end || project.targetEndDate);
      const metrics = aggregateProjectMetrics(projectTasks, todayISO());
      const derivedStatus = metrics.progress >= 100 ? 'completed' : metrics.progress > 0 ? 'inProgress' : 'notStarted';

      const syncedProject = Object.assign({}, project, {
        start: windowInfo.start,
        end: windowInfo.end,
        targetEndDate: project.targetEndDate || windowInfo.end,
        progress: Math.round(metrics.progress || 0),
        budget: metrics.BAC || toNumber(project.budget || 0),
        ac: metrics.AC,
        ev: metrics.EV,
        pv: metrics.PV,
        cpi: metrics.CPI,
        spi: metrics.SPI,
        eac: metrics.EAC,
        etc: metrics.ETC,
        vac: metrics.VAC,
        cv: metrics.CV,
        sv: metrics.SV,
        tcpi: metrics.TCPI,
        health: metrics.health,
        status: projectTasks.length ? derivedStatus : (project.status || 'notStarted'),
        methodology: project.methodology || 'hybrid',
        defaultView: project.defaultView || 'list',
        template: project.template || 'blank',
        updatedAt: new Date().toISOString()
      });

      if (summary){
        Object.assign(summary, {
          name: syncedProject.name,
          ps: syncedProject.start,
          pe: syncedProject.end,
          pct: syncedProject.progress,
          bac: syncedProject.budget,
          ac: syncedProject.ac,
          ev: syncedProject.ev,
          pv: syncedProject.pv,
          cpi: syncedProject.cpi,
          spi: syncedProject.spi,
          eac: syncedProject.eac,
          etc: syncedProject.etc,
          vac: syncedProject.vac,
          cv: syncedProject.cv,
          sv: syncedProject.sv,
          tcpi: syncedProject.tcpi,
          status: syncedProject.status,
          ks: normalizeBoardStatus(summary.ks || summary.column || syncedProject.status) === 'in_progress' ? 'inprogress' : normalizeBoardStatus(summary.ks || summary.column || syncedProject.status)
        });
      }
      return syncedProject;
    });

    next.wbs = next.wbs.map(function(item){
      const project = next.projects.find(p => p.id === (item.projectId || item.project_id || item.pid));
      if (!project) return item;
      return normalizeTaskEntity(item, project);
    });

    next.projectViews = next.projects.map(function(project){
      const tasks = next.wbs.filter(item => (item.projectId || item.project_id || item.pid) === project.id && item.type !== 'summary').map(item => normalizeTaskEntity(item, project));
      return {
        projectId: project.id,
        kanban: [
          { id: 'todo', title: 'To Do', items: tasks.filter(t => t.column === 'todo') },
          { id: 'in_progress', title: 'In Progress', items: tasks.filter(t => t.column === 'in_progress') },
          { id: 'done', title: 'Done', items: tasks.filter(t => t.column === 'done') }
        ],
        gantt: tasks
          .filter(t => t.startDate || t.dueDate)
          .map(t => ({
            id: t.id,
            label: t.title || t.name,
            project_id: project.id,
            start_date: t.startDate,
            due_date: t.dueDate,
            progress: t.progress,
            status: t.status,
            dependency_ids: t.deps || [],
            evm: t.evm || calcTaskEvm(t)
          }))
      };
    });

    return next;
  }

  function ensureProjectSettings(state, project){
    state.projectSettings = Array.isArray(state.projectSettings) ? state.projectSettings : [];
    const existing = state.projectSettings.find(s => s.projectId === project.id);
    if (existing) return existing;
    const settings = {
      projectId: project.id,
      methodology: project.methodology || 'hybrid',
      defaultView: project.defaultView || 'list',
      kanbanColumns: [
        { id: 'todo', title: 'To Do' },
        { id: 'in_progress', title: 'In Progress' },
        { id: 'done', title: 'Done' }
      ],
      ganttScale: 'month',
      workingDays: [1,2,3,4,5],
      baselineEnabled: true,
      riskTrackingEnabled: true,
      changeControlEnabled: true
    };
    state.projectSettings.push(settings);
    return settings;
  }

  function audit(state, action, entityType, entityId, payload){
    state.audit = Array.isArray(state.audit) ? state.audit : [];
    const session = getSession();
    state.audit.unshift({
      id: uid('audit'),
      action,
      entityType,
      entityId,
      at: new Date().toISOString(),
      by: session ? session.userId : null,
      payload: payload || null
    });
    state.audit = state.audit.slice(0, 100);
  }

  
  // PROJECT CRUD SECTION: create/update/archive projects and keep all downstream views aligned
  function createProject(userId, form){
    const state = getState(userId);
    if (!state) throw new Error('No user state found.');
    const result = window.TriCoreProjectTools && window.TriCoreProjectTools.createProjectPackage
      ? window.TriCoreProjectTools.createProjectPackage(form, state)
      : { ok: false, error: 'Project tool is unavailable.' };
    if (!result.ok) throw new Error(result.error || 'Unable to create project.');

    state.projects = Array.isArray(state.projects) ? state.projects : [];
    state.wbs = Array.isArray(state.wbs) ? state.wbs : [];
    state.projects.push(result.project);
    state.wbs.push.apply(state.wbs, result.wbs || []);
    ensureProjectSettings(state, result.project);
    audit(state, 'create', 'project', result.project.id, { code: result.project.code, name: result.project.name });

    const synced = syncStateArtifacts(state);
    saveState(userId, synced);
    return { project: synced.projects.find(p => p.id === result.project.id), state: synced };
  }

  function updateProject(userId, projectId, patch){
    const state = getState(userId);
    if (!state) throw new Error('No user state found.');
    state.projects = Array.isArray(state.projects) ? state.projects : [];
    const idx = state.projects.findIndex(p => p.id === projectId);
    if (idx === -1) throw new Error('Project not found.');

    const current = state.projects[idx];
    const next = Object.assign({}, current, patch || {});
    if (patch && patch.code) next.code = cleanCode(patch.code);
    if (next.start && next.end && new Date(next.end) < new Date(next.start)) {
      throw new Error('Target end date must be after the start date.');
    }

    state.projects[idx] = next;

    state.wbs = (Array.isArray(state.wbs) ? state.wbs : []).map(function(item){
      const pid = item.projectId || item.project_id || item.pid;
      if (pid !== projectId) return item;
      const updated = Object.assign({}, item);
      if (item.type === 'summary' || item.par == null) {
        updated.name = next.name;
        updated.ps = next.start || updated.ps;
        updated.pe = next.end || next.targetEndDate || updated.pe;
        updated.resp = next.owner || updated.resp;
        updated.pri = next.priority || updated.pri;
      } else {
        updated.resp = next.owner || updated.resp;
        updated.pri = next.priority || updated.pri;
      }
      return updated;
    });

    audit(state, 'update', 'project', projectId, patch || {});
    const synced = syncStateArtifacts(state);
    saveState(userId, synced);
    return { project: synced.projects.find(p => p.id === projectId), state: synced };
  }

  function archiveProject(userId, projectId){
    return updateProject(userId, projectId, { archived: true, status: 'completed' });
  }

  function createTask(userId, payload){
    const state = getState(userId);
    if (!state) throw new Error('No user state found.');
    const project = (state.projects || []).find(p => p.id === payload.projectId);
    if (!project) throw new Error('Project not found.');

    const task = normalizeTaskEntity({
      id: uid('task'),
      name: payload.name || payload.title,
      title: payload.title || payload.name,
      description: payload.description || '',
      projectId: payload.projectId,
      project_id: payload.projectId,
      pid: payload.projectId,
      par: payload.parentId || (state.wbs.find(i => (i.projectId || i.project_id || i.pid) === payload.projectId && (i.type === 'summary' || i.par == null)) || {}).id || null,
      type: payload.type || 'workpackage',
      ps: payload.startDate || project.start || todayISO(),
      pe: payload.dueDate || project.end || addDays(todayISO(), 7),
      bac: toNumber(payload.bac || payload.budget || 0),
      ac: toNumber(payload.ac || 0),
      pct: toNumber(payload.progress || 0),
      pri: payload.priority || 'medium',
      ks: payload.column || payload.status || 'todo',
      column: payload.column || payload.status || 'todo',
      status: boardToProjectStatus(normalizeBoardStatus(payload.column || payload.status)),
      deps: Array.isArray(payload.dependencyIds) ? payload.dependencyIds : [],
      resp: payload.assignee || project.owner || ''
    }, project);

    state.wbs = Array.isArray(state.wbs) ? state.wbs : [];
    state.wbs.push(task);
    audit(state, 'create', 'task', task.id, { projectId: payload.projectId, title: task.title });
    const synced = syncStateArtifacts(state);
    saveState(userId, synced);
    return { task: synced.wbs.find(t => t.id === task.id), state: synced };
  }

  function updateTask(userId, taskId, patch){
    const state = getState(userId);
    if (!state) throw new Error('No user state found.');
    state.wbs = Array.isArray(state.wbs) ? state.wbs : [];
    const idx = state.wbs.findIndex(t => String(t.id) === String(taskId));
    if (idx === -1) throw new Error('Task not found.');
    const current = state.wbs[idx];
    const project = (state.projects || []).find(p => p.id === (current.projectId || current.project_id || current.pid));
    const next = normalizeTaskEntity(Object.assign({}, current, patch || {}), project || { id: current.projectId || current.project_id || current.pid, owner: current.resp, priority: current.pri });
    state.wbs[idx] = next;
    audit(state, 'update', 'task', taskId, patch || {});
    const synced = syncStateArtifacts(state);
    saveState(userId, synced);
    return { task: synced.wbs.find(t => String(t.id) === String(taskId)), state: synced };
  }

  function moveTask(userId, taskId, nextStatus){
    return updateTask(userId, taskId, { column: nextStatus, status: boardToProjectStatus(normalizeBoardStatus(nextStatus)) });
  }

  function deleteTask(userId, taskId){
    const state = getState(userId);
    if (!state) throw new Error('No user state found.');
    state.wbs = (Array.isArray(state.wbs) ? state.wbs : []).filter(t => String(t.id) !== String(taskId));
    audit(state, 'delete', 'task', taskId, null);
    const synced = syncStateArtifacts(state);
    saveState(userId, synced);
    return { ok: true, state: synced };
  }

    const tasks = Array.isArray(state.wbs) ? state.wbs.filter(t => t.type !== 'summary') : [];
    return {
      userId: resolved,
      projects: projects,
      tasks: tasks,
      projectViews: state.projectViews || [],

    const body = overlay.querySelector('#tricore-wizard-body');
    const form = overlay.querySelector('#tricore-project-form');
    const msg = overlay.querySelector('#tricore-form-msg');
    const sections = Array.from(overlay.querySelectorAll('.tcw-section'));
    const pills = Array.from(overlay.querySelectorAll('.tcw-step-pill'));
    const nextBtn = overlay.querySelector('#tricore-next-wizard');
    const backTop = overlay.querySelector('#tricore-back-wizard-top');
    const backBottom = overlay.querySelector('#tricore-back-wizard');

    // Pre-fill safe defaults so the user never starts with a blank project shell.
    try {

      const state = userId ? getState(userId) : { projects: [] };
      const fallbackName = window.TriCoreProjectTools && window.TriCoreProjectTools.defaultProjectName
        ? window.TriCoreProjectTools.defaultProjectName(state.projects || [])
        : 'Project Number 1';
      const fallbackCode = window.TriCoreProjectTools && window.TriCoreProjectTools.defaultProjectCode
        ? window.TriCoreProjectTools.defaultProjectCode(state.projects || [])
        : 'PRJ-001';
      if (form.elements.name && !String(form.elements.name.value || '').trim()) form.elements.name.value = fallbackName;
      if (form.elements.code && !String(form.elements.code.value || '').trim()) form.elements.code.value = fallbackCode;
    } catch (_err) {}
    let currentStep = 0;

    /* ─── Robust scroll-to-top for the modal body ───────────────────────
       Strategy:
       1. Immediately zero scrollTop (catches synchronous cases)
       2. After one rAF (post-paint), zero again (catches layout-reflow cases)
       3. After a second rAF, zero once more (catches async/step-change cases)
       4. Use a short setTimeout as a final safety net
       NOTE: We deliberately do NOT call scrollIntoView() — it repositions
       relative to the *viewport*, not the scroll container, and fights
       against scrollTop=0 when the element is already off-screen inside
       the container.
    ─────────────────────────────────────────────────────────────────── */
    function forceWizardTop(){
      function resetScroll(){
        if (body){
          body.scrollTop = 0;
          if (typeof body.scrollTo === 'function') body.scrollTo({ top:0, behavior:'auto' });
        }
      }
      resetScroll();
      requestAnimationFrame(function(){
        resetScroll();
        requestAnimationFrame(function(){
          resetScroll();
        });
      });
    }

    function closeWizard(){
      document.body.style.overflow = previousBodyOverflow;
      overlay.remove();
    }
    overlay.querySelector('#tricore-close-wizard').onclick = closeWizard;
    overlay.querySelector('.tcw-backdrop').onclick = closeWizard;

    function setMsg(text, isError){
      msg.textContent = text || '';
      msg.style.color = isError ? '#dc2626' : '#64748b';
    }

    function diffDays(start, end){
      if (!start || !end) return null;
      const s = new Date(start);
      const e = new Date(end);
      if (Number.isNaN(s.getTime()) || Number.isNaN(e.getTime())) return null;
      return Math.max(1, Math.round((e - s) / 86400000) + 1);
    }

    function getTemplateMeta(templateKey){
      const key = templateKey || 'blank';
      const raw = Array.isArray(templateCatalog[key]) ? templateCatalog[key] : [];
      const meta = templateMeta[key] || templateMeta.blank;
      return {
        label: meta.label,
        tasks: raw.length || meta.tasks,
        columns: meta.columns,
        summary: meta.summary
      };
    }

    function updateDerivedPreview(){
      const start = form.elements.start.value;
      const end = form.elements.end.value;
      const duration = diffDays(start, end);
      const budget = Number(form.elements.budget.value || 0);
      const currency = String(form.elements.currency.value || 'SAR').trim() || 'SAR';
      const template = getTemplateMeta(form.elements.template.value);
      const durationNode = overlay.querySelector('#tcw-duration-days');
      const bacNode = overlay.querySelector('#tcw-bac-preview');
      const taskNode = overlay.querySelector('#tcw-template-task-count');
      const columnNode = overlay.querySelector('#tcw-template-columns');
      const chipsNode = overlay.querySelector('#tcw-template-chips');

      if (durationNode) durationNode.textContent = duration ? duration + ' days' : '—';
      if (bacNode) bacNode.textContent = budget > 0 ? (currency + ' ' + budget.toLocaleString()) : 'Template-driven';
      if (taskNode) taskNode.textContent = String(template.tasks);
      if (columnNode) columnNode.textContent = String(template.columns);
      if (chipsNode){
        chipsNode.innerHTML = [
          '<div class="tcw-chip">' + template.label + '</div>',
          '<div class="tcw-chip">' + (form.elements.methodology.value || 'hybrid') + '</div>',
          '<div class="tcw-chip">' + (form.elements.defaultView.value || 'list') + ' view</div>'
        ].join('');
      }
    }

    function validateStep(step){
      const section = sections[step];
      if (!section) return true;
      const requiredFields = Array.from(section.querySelectorAll('[required]'));
      for (const field of requiredFields){
        if (!String(field.value || '').trim()){
          field.focus();
          setMsg('Please complete all required fields in this step.', true);
          return false;
        }
      }
      if (step === 0){
        const nameField = form.elements.name;
        const codeField = form.elements.code;
        if (nameField && codeField && !String(codeField.value || '').trim()){
          const seed = String(nameField.value || '')
            .trim()
            .replace(/[^a-zA-Z0-9]+/g,'-')
            .replace(/^-+|-+$/g,'')
            .toUpperCase()
            .slice(0,18);
          codeField.value = seed ? ('PRJ-' + seed) : '';
        }
        if (codeField) codeField.value = cleanCode(codeField.value || codeField.placeholder || '');
      }
      if (step === 1){
        const start = form.elements.start.value;
        const end = form.elements.end.value;
        if (start && end && new Date(end) < new Date(start)){
          form.elements.end.focus();
          setMsg('Target end date must be on or after the start date.', true);
          return false;
        }
      }
      setMsg('');
      return true;
    }

    function reviewItem(label, value){
      return '<div class="tcw-review-item"><span>' + label + '</span><span>' + (value || '—') + '</span></div>';
    }

    function renderReview(){
      const data = Object.fromEntries(new FormData(form).entries());
      const template = getTemplateMeta(data.template);
      const duration = diffDays(data.start, data.end);
      overlay.querySelector('#tricore-review-identity').innerHTML = [
        reviewItem('Project Name', data.name),
        reviewItem('Project Code', cleanCode(data.code)),
        reviewItem('Owner', data.owner),
        reviewItem('Department', data.dept),
        reviewItem('Type', data.type)
      ].join('');
      overlay.querySelector('#tricore-review-planning').innerHTML = [
        reviewItem('Start', data.start),
        reviewItem('End', data.end),
        reviewItem('Duration', duration ? (duration + ' days') : '—'),
        reviewItem('Methodology', data.methodology),
        reviewItem('Template', template.label),
        reviewItem('Starter tasks', template.tasks),
        reviewItem('Default View', data.defaultView),
        reviewItem('Priority', data.priority),
        reviewItem('Budget', data.budget ? ((data.currency || 'SAR') + ' ' + Number(data.budget).toLocaleString()) : 'Template-driven')
      ].join('');
    }

    function updateWizardUI(){
      sections.forEach(function(section, index){
        section.classList.toggle('active', index === currentStep);
      });
      pills.forEach(function(pill, index){
        pill.classList.toggle('active', index === currentStep);
        pill.classList.toggle('done', index < currentStep);
      });
      const onFirst = currentStep === 0;
      const onLast = currentStep === sections.length - 1;
      backTop.textContent = onFirst ? 'Back to workspace' : 'Previous step';
      backBottom.textContent = onFirst ? 'Cancel' : 'Previous';
      nextBtn.style.display = onLast ? 'none' : 'inline-flex';
      submitBtn.style.display = onLast ? 'inline-flex' : 'none';
      if (onLast) renderReview();
      forceWizardTop();
      updateDerivedPreview();
      setMsg('');
    }

    function stepBack(){
      if (currentStep === 0) { closeWizard(); return; }
      currentStep -= 1;
      updateWizardUI();
    }

    function stepNext(){
      if (!validateStep(currentStep)) return;
      if (currentStep < sections.length - 1){
        currentStep += 1;
        updateWizardUI();
      }
    }

    backTop.onclick = stepBack;
    backBottom.onclick = stepBack;
    nextBtn.onclick = stepNext;

    form.addEventListener('input', function(ev){
      if (ev.target && ev.target.name === 'name' && !String(form.elements.code.value || '').trim()){
        const seed = String(ev.target.value || '')
          .trim()
          .replace(/[^a-zA-Z0-9]+/g,'-')
          .replace(/^-+|-+$/g,'')
          .toUpperCase()
          .slice(0,18);
        form.elements.code.placeholder = seed ? ('PRJ-' + seed) : 'Example: PRJ-001';
      }
      updateDerivedPreview();
    });
    form.addEventListener('change', updateDerivedPreview);

    form.addEventListener('keydown', function(ev){
      if (ev.key === 'Escape'){
        ev.preventDefault();
        closeWizard();
        return;
      }
      if (ev.key === 'Enter' && ev.target.tagName !== 'TEXTAREA' && currentStep < sections.length - 1){
        ev.preventDefault();
        stepNext();
      }
    });

    form.onsubmit = function(ev){
      ev.preventDefault();
      for (let i = 0; i < sections.length - 1; i += 1){
        if (!validateStep(i)){
          currentStep = i;
          updateWizardUI();
          return;
        }
      }
      const data = Object.fromEntries(new FormData(form).entries());
      data.code = cleanCode(data.code || form.elements.code.placeholder || '');
      const userId = getCurrentUserId();
      if (!userId){
        setMsg('Please sign in first.', true);
        return;
      }
      try {
        createProject(userId, data);
        closeWizard();
        rerenderHint('Project created successfully. Projects, Kanban, and Gantt are now aligned.');
        setTimeout(function(){ location.reload(); }, 700);
      } catch(err){
        setMsg(err.message || 'Unable to create project.', true);
      }
    };

    updateWizardUI();
    updateDerivedPreview();
    /* Focus the first field without allowing the browser to scroll to it.
       Then hard-reset the scroll position in multiple frames to guarantee
       the modal always opens at the top regardless of rendering timing. */
    setTimeout(function(){
      const firstField = form.elements.name;
      if (firstField && typeof firstField.focus === 'function') {
        try { firstField.focus({ preventScroll:true }); } catch(_err) {}
      }
      forceWizardTop();
      /* Final safety net: catch any post-focus reflow that might push scroll down */
      setTimeout(function(){
        if (body) { body.scrollTop = 0; if (typeof body.scrollTo === 'function') body.scrollTo({ top:0, behavior:'auto' }); }
      }, 80);
    }, 30);
  }

  function bootstrapExisting(){
    const userId = getCurrentUserId();
    if (!userId) return;
    const state = getState(userId);
    if (!state) return;
    const synced = syncStateArtifacts(state);
    saveState(userId, synced);
  }

  window.TriCoreLaunchKit = {
    syncStateArtifacts,
    createProject,
    updateProject,
    archiveProject,
    createTask,
    updateTask,
    moveTask,
    deleteTask,
    getLaunchPayload,
    calcTaskEvm,
    aggregateProjectMetrics
  };

  bootstrapExisting();
  installQuickLauncher();
})();

  <script type="module">
  async function tricoreGetProfile(userId) {
    const { data, error } = await window.supabase
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .maybeSingle();

    if (error) throw error;
    return data;
  }

  async function tricoreEnsureProfile(user, fallbackName, fallbackRole) {
    let profile = await tricoreGetProfile(user.id);

    if (!profile) {
      const payload = {
        id: user.id,
        full_name: fallbackName || user.user_metadata?.full_name || user.email?.split('@')[0] || 'User',
        email: user.email,
        role: fallbackRole || 'pm'
      };

      const { error: insertError } = await window.supabase
        .from('profiles')
        .insert(payload);

      if (insertError) throw insertError;
      profile = payload;
    }

    return profile;
  }

  function tricoreBuildSession(user, profile) {
    return {
      userId: user.id,
      name: profile?.full_name || user.user_metadata?.full_name || user.email || 'User',
      email: user.email || '',
      role: profile?.role || 'pm',
      loginTime: Date.now()
    };
  }

  function tricoreSaveCompatSession(session) {
    localStorage.setItem('tc_session', JSON.stringify(session));
    return session;
  }

  async function tricoreSyncSessionFromSupabase() {
    const { data, error } = await window.supabase.auth.getUser();
    if (error) throw error;

    const user = data?.user;
    if (!user) {
      localStorage.removeItem('tc_session');
      return null;
    }

    const profile = await tricoreEnsureProfile(user);
    const session = tricoreBuildSession(user, profile);
    tricoreSaveCompatSession(session);
    return session;
  }

          password
        });

        if (error) return { ok: false, err: error.message };

        const user = data?.user;

      }
    };

    // Logout from both Supabase and compatibility local session
    window.Zl.logout = async function() {
      try {
        await window.supabase.auth.signOut();
      } catch (_) {}
      localStorage.removeItem('tc_session');
    };

    console.log('TriCore auth patched to Supabase.');
  };

  // Apply the patch after page load
  window.addEventListener('load', async function() {
    window.tricorePatchAuth();

    // If user already has an active Supabase session, mirror it into tc_session
    try {
      await tricoreSyncSessionFromSupabase();
    } catch (e) {
      console.warn('Session sync skipped:', e?.message || e);
    }
  });
</script>
  <script type="module">
  window.tricoreCreateProject = async function(payload) {
    const user = await window.tricoreCurrentUser();
    if (!user) throw new Error('No authenticated user found');

    const { data, error } = await window.supabase
      .from('projects')
      .insert({
        owner_id: user.id,
        name: payload.name,
        code: payload.code || null,
        owner_name: payload.owner_name || null,
        department: payload.department || null,
        status: payload.status || 'planning',
        start_date: payload.start_date || null,
        end_date: payload.end_date || null
      })
      .select()
      .single();

    if (error) throw error;
    return data;
  };

  window.tricoreLoadProjects = async function() {
    const user = await window.tricoreCurrentUser();
    if (!user) return [];

    const { data, error } = await window.supabase
      .from('projects')
      .select('*')
      .eq('owner_id', user.id)
      .order('created_at', { ascending: false });

    if (error) throw error;
    return data || [];
  };
</script>
  <script type="module">
  window.tricorePatchProjectCreation = function() {
    const originalOpenWizard = window.openProjectWizard;

    if (!originalOpenWizard) {
      console.warn('openProjectWizard not found yet.');
      return;
    }

    window.openProjectWizard = function() {
      originalOpenWizard();

      setTimeout(() => {
        const form = document.querySelector('#tricore-project-form');
        if (!form || form.dataset.supabaseBound === 'true') return;

        form.dataset.supabaseBound = 'true';

        form.addEventListener('submit', async function(e) {
          e.preventDefault();

          try {
            const formData = new FormData(form);

            const payload = {
              name: formData.get('name'),
              code: formData.get('code'),
              owner_name: formData.get('owner') || 'Khalid',
              department: formData.get('department') || 'PMO',
              status: formData.get('status') || 'planning',
              start_date: formData.get('start'),
              end_date: formData.get('end')
            };

            const created = await window.tricoreCreateProject(payload);
            console.log('Project created in Supabase:', created);

            alert('Project created successfully');
            location.reload();
          } catch (err) {
            console.error(err);
            alert(err.message || 'Failed to create project');
          }
        }, true);
      }, 300);
    };
  };

  window.addEventListener('load', function() {
    setTimeout(() => {
      window.tricorePatchProjectCreation();
    }, 1500);
  });
</script>
  <script type="module">
  window.tricoreHydrateProjectsFromSupabase = async function() {
    try {
      const user = await window.tricoreCurrentUser();
      if (!user) return;

      const projects = await window.tricoreLoadProjects();

      const stored = JSON.parse(localStorage.getItem('tc_state_' + user.id) || '{}');
      const nextState = Object.assign({}, stored, {
        projects: Array.isArray(projects) ? projects : (stored.projects || [])
      });

      localStorage.setItem('tc_state_' + user.id, JSON.stringify(nextState));
      console.log('Hydrated projects from Supabase:', projects);
    } catch (err) {
      console.error('Hydration failed:', err);
    }
  };

  window.addEventListener('load', function() {
    setTimeout(async () => {
      await window.tricoreHydrateProjectsFromSupabase();
    }, 1200);
  });
</script>
